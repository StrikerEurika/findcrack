name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v0.1.1

permissions:
  contents: write    # Required for creating GitHub Releases
  id-token: write    # Required for OIDC Trusted Publishing to PyPI/TestPyPI

jobs:
  release:
    name: Build, Publish and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for setuptools-scm to fetch all tags for version resolution

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ">=3.11"

      - name: Build distributions
        run: uv build

      - name: Publish to TestPyPI (API Token)
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true # non-stop on error, since this is just a test
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.FINDCRACK_TESTPYPI_API_TOKEN }}

      - name: Publish to PyPI (OIDC Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true